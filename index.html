<!DOCTYPE html>

<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銷售報表分析系統（年度對比版）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
        }

    .container {
        flex: 1;
        background: white;
        overflow-y: auto;
        overflow-x: hidden;
        max-height: 100vh;
        min-width: 0;
    }

    .header {
        background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        color: white;
        padding: 30px;
        text-align: center;
        box-sizing: border-box;
    }

    .header h1 {
        font-size: 2.5em;
        margin-bottom: 10px;
    }

    .header p {
        font-size: 1.1em;
        opacity: 0.9;
    }

    .upload-section {
        padding: 40px;
        background: #f8f9fa;
        box-sizing: border-box;
    }

    .upload-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
        margin-bottom: 30px;
    }

    .upload-box {
        background: white;
        border: 3px dashed #3b82f6;
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
    }

    .upload-box:hover {
        border-color: #8b5cf6;
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
    }

    .upload-box.uploaded {
        border-color: #10b981;
        background: #ecfdf5;
    }

    .upload-box input[type="file"] {
        display: none;
    }

    .upload-box input[type="text"] {
        width: 100%;
        padding: 8px;
        margin-top: 10px;
        border: 2px solid #3b82f6;
        border-radius: 5px;
        font-size: 0.9em;
        text-align: center;
    }

    .upload-icon {
        font-size: 2.5em;
        margin-bottom: 15px;
    }

    .upload-box h3 {
        color: #333;
        margin-bottom: 10px;
        font-size: 1.1em;
    }

    .upload-box p {
        color: #666;
        font-size: 0.85em;
    }

    .file-name {
        margin-top: 10px;
        color: #10b981;
        font-weight: bold;
        font-size: 0.85em;
    }

    .analyze-btn {
        display: block;
        width: 100%;
        max-width: 300px;
        margin: 0 auto;
        padding: 15px 30px;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 1.2em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .analyze-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(2, 132, 199, 0.4);
    }

    .analyze-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
    }

    .results-section {
        padding: 40px;
        display: none;
        box-sizing: border-box;
    }

    .results-section.show {
        display: block;
    }

    .section-title {
        font-size: 1.8em;
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 3px solid #3b82f6;

    }

    table {

        background: white;

    table thead {

    /* 表頭第一層 (品項/銷售數量/銷售金額/毛利額/毛利率) */
    table th[rowspan="2"],

    }

    }

    table td {

        background: white;
    }

    table tbody tr:last-child td {
        border-bottom: 1px solid #f0f0f0;
    }

    table tbody tr:hover {
        background: #fafbfc;
    }
    
    /* 針對總計摘要列優化 */
    table tbody tr[style*="font-weight: 600;"] td {
        background: #f0f4f8 !important;
    }
    table tbody tr[style*="font-weight: 700;"] td {
        background: #fffbf0 !important;
    }

    .number {
        text-align: right;
        font-family: 'Arial', sans-serif;
        color: #333;
    }

    .positive {
        color: #10b981;
    }

    .negative {
        color: #dc3545;
    }

    .yoy-increase {
        color: #10b981;
    }

    .yoy-decrease {
        color: #dc3545;
    }

    .yoy-neutral {
        color: #666;
    }

    .loading {
        text-align: center;
        padding: 40px;
        display: none;
    }

    .loading.show {
        display: block;
    }

    .loading-spinner {
        display: inline-block;
        width: 50px;
        height: 50px;
        border: 5px solid #f3f3f3;
        border-top: 5px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .top3-section {
        margin-top: 40px;
    }

    .top3-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 10px;
    }

    @media (max-width: 768px) {

        }

        }

<!-- 主要內容區 -->
<div class="container">
    <div class="header">
        <h1>📊 銷售報表分析系統（年度對比版）</h1>
    </div>

    <div class="upload-section">
        <div class="upload-grid">
            <div class="upload-box" id="sales1UploadBox" onclick="document.getElementById('sales1File').click()">
                <div class="upload-icon">📊</div>
                <h3>銷售報表 1</h3>
                <p>上傳第一份報表 (.xls/.xlsx)</p>
                <input type="file" id="sales1File" accept=".xls,.xlsx" onchange="handleFileUpload('sales1', this)">
                <input type="text" id="sales1Name" placeholder="例如：2024年10月" value="去年">
                <div class="file-name" id="sales1FileName"></div>
            </div>

            <div class="upload-box" id="sales2UploadBox" onclick="handleBoxClick('sales2', event)">
                <div class="upload-icon">📊</div>
                <h3>銷售報表 2</h3>
                <p>上傳第二份報表 (.xls/.xlsx)</p>
                <input type="file" id="sales2File" accept=".xls,.xlsx" onchange="handleFileUpload('sales2', this)">
                <input type="text" id="sales2Name" placeholder="例如：2025年10月" value="今年">
                <div class="file-name" id="sales2FileName"></div>
            </div>
        </div>

        <div style="margin: 20px 0; padding: 15px; background: #f0f9ff; border-left: 4px solid #3b82f6; border-radius: 8px;">
            <p style="color: #1e40af; margin: 0; font-size: 0.95em;">
                📌 <strong>參照資料：</strong>系統將自動從 GitHub 載入 lizan_reference.xlsx
            </p>
            <p id="refLoadStatus" style="color: #666; margin: 8px 0 0 0; font-size: 0.85em;">正在載入參照資料...</p>
        </div>

        <button class="analyze-btn" id="analyzeBtn" onclick="analyzeData()" disabled>
            🚀 開始分析與對比
        </button>
    </div>

    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p style="margin-top: 20px;">正在分析資料...</p>
    </div>

    <div class="results-section" id="results">
        <h2 class="section-title">📊 銷售分析結果與年度對比</h2>
        <div id="storeContent"></div>
    </div>
</div>

<script>
    // GitHub 參照檔案 URL
    const GITHUB_REF_FILE_URL = 'https://raw.githubusercontent.com/moriochang/store_report/main/data/lizan_reference.xlsx';
    
    let sales1Data = null;
    let sales2Data = null;
    let refData = null;
    let analysisResults1 = null;
    let analysisResults2 = null;

    // 店鋪代號直接顯示
    const storeIds = [0, 45, 47, 48, 51, 57, 61, 65, 75, 76, 77, 81, 84, 86, 88, 89, 97, 115, 116, 117, 820, 821];

    // 區域分類
    const regionGroups = {
        '總公司': [0],
        '北一區': [45, 47, 48],
        '北二區': [51, 57, 61, 65],
        '中區': [75, 76, 77, 81, 84],
        '台南區': [86, 88, 89, 97],
        '高雄區': [115, 116, 117],
        '線上EC': [820, 821]
    };

    // 店鋪名稱映射
    const storeNames = {
        0: '全社',
        45: '45',
        47: '47',
        48: '48',
        51: '51',
        57: '57',
        61: '61',
        65: '65',
        75: '75',
        76: '76',
        77: '77',
        81: '81',
        84: '84',
        86: '86',
        88: '88',
        89: '89',
        97: '97',
        115: '115',
        116: '116',
        117: '117',
        820: '820',
        821: '821'
    };

    const targetCategories = ['CPU', 'iPad', 'iPhone', 'Apple Watch', 'AirPods', 'Audio', 'Care', 'Accy', '3rd Party'];

    // Audio 和 Accy 使用小分類，其他使用中分類
    const smallCategoryList = ['Audio', 'Accy'];

    // 根據大分類決定 Top 數量
    function getTopCount(bigCategory) {
        if (['CPU', 'iPad', 'iPhone', 'Apple Watch'].includes(bigCategory)) {
            return 5;  // Top 5
        } else if (['Accy', '3rd Party'].includes(bigCategory)) {
            return 10; // Top 10
        } else {
            return 3;  // 其他維持 Top 3 (AirPods, Audio, Care)
        }
    }

    // 註冊 ChartDataLabels 插件（全局）
    if (typeof ChartDataLabels !== 'undefined') {
        Chart.register(ChartDataLabels);
    }

    // 頁面載入時自動載入 GitHub 參照檔案
    window.addEventListener('DOMContentLoaded', function() {
        loadReferenceFromGitHub();
    });

    // 從 GitHub 載入參照檔案
    async function loadReferenceFromGitHub() {
        const statusEl = document.getElementById('refLoadStatus');
        
        try {
            statusEl.textContent = '⏳ 正在從 GitHub 載入參照資料...';
            statusEl.style.color = '#666';
            
            const response = await fetch(GITHUB_REF_FILE_URL);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, { type: 'array' });
            
            // 將 workbook 轉換為 JSON 陣列
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            refData = XLSX.utils.sheet_to_json(firstSheet);
            
            statusEl.textContent = '✅ 參照資料載入成功！';
            statusEl.style.color = '#10b981';
            
            checkAnalyzeButton();
        } catch (error) {
            console.error('載入參照檔案失敗:', error);
            statusEl.innerHTML = `
                ❌ 載入失敗：${error.message}<br>
                <span style="font-size: 0.8em;">請確認 GitHub URL 是否正確設定</span>
            `;
            statusEl.style.color = '#ef4444';
        }
    }

    function handleBoxClick(type, event) {
        if (event.target.tagName !== 'INPUT' || event.target.type !== 'text') {
            document.getElementById(type + 'File').click();
        }
    }

    function handleFileUpload(type, input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(firstSheet);

            if (type === 'sales1') {
                sales1Data = jsonData;
                document.getElementById('sales1FileName').textContent = `✓ ${file.name}`;
                document.getElementById('sales1UploadBox').classList.add('uploaded');
            } else if (type === 'sales2') {
                sales2Data = jsonData;
                document.getElementById('sales2FileName').textContent = `✓ ${file.name}`;
                document.getElementById('sales2UploadBox').classList.add('uploaded');
            } else {
                refData = jsonData;
                document.getElementById('refFileName').textContent = `✓ ${file.name}`;
                document.getElementById('refUploadBox').classList.add('uploaded');
            }

            checkReadyToAnalyze();
        };
        reader.readAsArrayBuffer(file);
    }

    function checkReadyToAnalyze() {
        if (sales1Data && sales2Data && refData) {
            document.getElementById('analyzeBtn').disabled = false;
        }
    }

    function processSalesData(salesData, refMap) {
        const filteredData = salesData
            .filter(item => storeIds.includes(item.store_code_id))
            .map(item => {
                const ref = refMap[item.product_code] || {};
                return {
                    ...item,
                    大分類: ref.大分類 || '未分類',
                    中分類: ref.中分類 || '未分類',
                    小分類: ref.小分類 || '未分類'
                };
            });

        const results = {};
        
        storeIds.forEach(storeId => {
            // 跳過ID為0（全社），稍後會自動計算
            if (storeId === 0) return;
            
            const storeData = filteredData.filter(item => item.store_code_id == storeId);
            
            results[storeId] = {
                id: storeId,
                categories: {},
                categoryTop3: {},
                careByMidCategory: {}  // 新增：Care的中分類統計
            };

            // 按大分類統計
            targetCategories.forEach(category => {
                const categoryData = storeData.filter(item => item.大分類 === category);
                
                const totalQty = categoryData.reduce((sum, item) => sum + (item.total_qty || 0), 0);
                const totalAmt = categoryData.reduce((sum, item) => sum + (item.total_amt_t1 || 0), 0);
                const totalCost = categoryData.reduce((sum, item) => sum + (item.total_cost || 0), 0);
                const totalAdj = categoryData.reduce((sum, item) => sum + (item.total_ADJ_COST || 0), 0);
                
                const profit = totalAmt - totalCost + totalAdj;
                const profitRate = totalAmt > 0 ? (profit / totalAmt * 100) : 0;

                results[storeId].categories[category] = {
                    qty: totalQty,
                    amt: totalAmt,
                    profit: profit,
                    profitRate: profitRate
                };
            });

            // 統計Care的中分類數據（用於計算搭售率）
            const careData = storeData.filter(item => item.大分類 === 'Care');
            careData.forEach(item => {
                const midCategory = item.中分類;
                if (!results[storeId].careByMidCategory[midCategory]) {
                    results[storeId].careByMidCategory[midCategory] = {
                        qty: 0,
                        amt: 0
                    };
                }
                results[storeId].careByMidCategory[midCategory].qty += item.total_qty || 0;
                results[storeId].careByMidCategory[midCategory].amt += item.total_amt_t1 || 0;
            });

            // 計算每個大分類的Top3和完整數據
            targetCategories.forEach(bigCategory => {
                const categoryItems = storeData.filter(item => item.大分類 === bigCategory);
                const groupData = {};
                let categoryTotalQty = 0;
                let categoryTotalAmt = 0;
                
                categoryItems.forEach(item => {
                    // Audio、Accy用小分類，其他用中分類
                    const key = smallCategoryList.includes(bigCategory) ? item.小分類 : item.中分類;
                    if (!groupData[key]) {
                        groupData[key] = {
                            name: key,
                            qty: 0,
                            amt: 0
                        };
                    }
                    groupData[key].qty += item.total_qty || 0;
                    groupData[key].amt += item.total_amt_t1 || 0;
                    categoryTotalQty += item.total_qty || 0;
                    categoryTotalAmt += item.total_amt_t1 || 0;
                });

                const allData = Object.values(groupData);
                
                const topCount = getTopCount(bigCategory);
                
                const top3Qty = [...allData]
                    .sort((a, b) => b.qty - a.qty)
                    .slice(0, topCount);

                const top3Amt = [...allData]
                    .sort((a, b) => b.amt - a.amt)
                    .slice(0, topCount);

                results[storeId].categoryTop3[bigCategory] = {
                    top3Qty: top3Qty,
                    top3Amt: top3Amt,
                    allData: allData,
                    totalQty: categoryTotalQty,
                    totalAmt: categoryTotalAmt
                };
            });
        });

        // 計算「全社」數據（所有店別的加總）
        results[0] = {
            id: 0,
            categories: {},
            categoryTop3: {},
            careByMidCategory: {}
        };

        // 初始化全社的大分類數據
        targetCategories.forEach(category => {
            results[0].categories[category] = {
                qty: 0,
                amt: 0,
                profit: 0,
                profitRate: 0
            };
        });

        // 加總所有店鋪的大分類數據（排除ID為0的自己）
        storeIds.forEach(storeId => {
            if (storeId === 0) return; // 跳過自己
            
            targetCategories.forEach(category => {
                const storeData = results[storeId].categories[category];
                results[0].categories[category].qty += storeData.qty;
                results[0].categories[category].amt += storeData.amt;
                results[0].categories[category].profit += storeData.profit;
            });
        });

        // 計算全社的毛利率
        targetCategories.forEach(category => {
            const amt = results[0].categories[category].amt;
            const profit = results[0].categories[category].profit;
            results[0].categories[category].profitRate = amt > 0 ? (profit / amt * 100) : 0;
        });

        // 加總Care的中分類數據
        storeIds.forEach(storeId => {
            if (storeId === 0) return;
            
            Object.keys(results[storeId].careByMidCategory).forEach(midCategory => {
                if (!results[0].careByMidCategory[midCategory]) {
                    results[0].careByMidCategory[midCategory] = {
                        qty: 0,
                        amt: 0
                    };
                }
                results[0].careByMidCategory[midCategory].qty += results[storeId].careByMidCategory[midCategory].qty;
                results[0].careByMidCategory[midCategory].amt += results[storeId].careByMidCategory[midCategory].amt;
            });
        });

        // 計算全社的Top3（需要合併所有店鋪的中分類/小分類數據）
        targetCategories.forEach(bigCategory => {
            const allGroupData = {};
            let totalQty = 0;
            let totalAmt = 0;

            // 合併所有店鋪的數據
            storeIds.forEach(storeId => {
                if (storeId === 0) return;
                
                const storeTop3 = results[storeId].categoryTop3[bigCategory];
                if (storeTop3 && storeTop3.allData) {
                    storeTop3.allData.forEach(item => {
                        if (!allGroupData[item.name]) {
                            allGroupData[item.name] = {
                                name: item.name,
                                qty: 0,
                                amt: 0
                            };
                        }
                        allGroupData[item.name].qty += item.qty;
                        allGroupData[item.name].amt += item.amt;
                    });
                    totalQty += storeTop3.totalQty;
                    totalAmt += storeTop3.totalAmt;
                }
            });

            const allData = Object.values(allGroupData);
            
            const topCount = getTopCount(bigCategory);
            
            const top3Qty = [...allData]
                .sort((a, b) => b.qty - a.qty)
                .slice(0, topCount);

            const top3Amt = [...allData]
                .sort((a, b) => b.amt - a.amt)
                .slice(0, topCount);

            results[0].categoryTop3[bigCategory] = {
                top3Qty: top3Qty,
                top3Amt: top3Amt,
                allData: allData,
                totalQty: totalQty,
                totalAmt: totalAmt
            };
        });

        return results;
    }

    function calculateYoY(value1, value2) {
        if (value1 === 0) return value2 > 0 ? 100 : 0;
        return ((value2 - value1) / value1 * 100);
    }

    function formatYoY(yoy) {
        const sign = yoy >= 0 ? '+' : '';
        return `${sign}${yoy.toFixed(2)}%`;
    }

    function getYoYClass(yoy) {
        if (yoy > 0) return 'yoy-increase';
        if (yoy < 0) return 'yoy-decrease';
        return 'yoy-neutral';
    }
    
    // 新增金額格式化函數，不含貨幣符號
    function formatAmount(amount) {
        return amount.toLocaleString('zh-TW', {maximumFractionDigits: 0});
    }

    function exportStoreCSV(storeId) {
        const data1 = analysisResults1[storeId];
        const data2 = analysisResults2[storeId];
        const period1Name = document.getElementById('sales1Name').value || '去年';
        const period2Name = document.getElementById('sales2Name').value || '今年';
        const storeName = storeNames[storeId] || storeId;
        
        // 取得當前日期
        const today = new Date();
        const dateStr = `${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`;
        
        // CSV 表頭
        let csv = '\uFEFF'; // UTF-8 BOM
        csv += `店鋪 ${storeName} 銷售數據對比\n\n`;
        csv += `品項,${period1Name}數量,${period2Name}數量,數量成長率,${period1Name}金額,${period2Name}金額,金額成長率,${period1Name}毛利,${period2Name}毛利,毛利成長率,${period1Name}毛利率,${period2Name}毛利率,毛利率差異\n`;
        
        // 各品項資料
        targetCategories.forEach(category => {
            const cat1 = data1.categories[category];
            const cat2 = data2.categories[category];
            
            const qtyYoY = calculateYoY(cat1.qty, cat2.qty);
            const amtYoY = calculateYoY(cat1.amt, cat2.amt);
            const profitYoY = calculateYoY(cat1.profit, cat2.profit);
            const profitRateYoY = cat2.profitRate - cat1.profitRate;
            
            csv += `${category},`;
            csv += `${cat1.qty},${cat2.qty},${formatYoY(qtyYoY)},`;
            csv += `${Math.round(cat1.amt)},${Math.round(cat2.amt)},${formatYoY(amtYoY)},`;
            csv += `${Math.round(cat1.profit)},${Math.round(cat2.profit)},${formatYoY(profitYoY)},`;
            csv += `${cat1.profitRate.toFixed(2)}%,${cat2.profitRate.toFixed(2)}%,${profitRateYoY >= 0 ? '+' : ''}${profitRateYoY.toFixed(2)}%\n`;
        });
        
        // 總計（排除Care）
        let total1Qty = 0, total1Amt = 0, total1Profit = 0;
        let total2Qty = 0, total2Amt = 0, total2Profit = 0;
        
        targetCategories.forEach(category => {
            if (category !== 'Care') {
                const cat1 = data1.categories[category];
                const cat2 = data2.categories[category];
                total1Qty += cat1.qty;
                total1Amt += cat1.amt;
                total1Profit += cat1.profit;
                total2Qty += cat2.qty;
                total2Amt += cat2.amt;
                total2Profit += cat2.profit;
            }
        });
        
        const total1ProfitRate = total1Amt > 0 ? (total1Profit / total1Amt * 100) : 0;
        const total2ProfitRate = total2Amt > 0 ? (total2Profit / total2Amt * 100) : 0;
        const totalQtyYoY = calculateYoY(total1Qty, total2Qty);
        const totalAmtYoY = calculateYoY(total1Amt, total2Amt);
        const totalProfitYoY = calculateYoY(total1Profit, total2Profit);
        const totalProfitRateYoY = total2ProfitRate - total1ProfitRate;
        
        csv += `總計（排除Care),`;
        csv += `${total1Qty},${total2Qty},${formatYoY(totalQtyYoY)},`;
        csv += `${Math.round(total1Amt)},${Math.round(total2Amt)},${formatYoY(totalAmtYoY)},`;
        csv += `${Math.round(total1Profit)},${Math.round(total2Profit)},${formatYoY(totalProfitYoY)},`;
        csv += `${total1ProfitRate.toFixed(2)}%,${total2ProfitRate.toFixed(2)}%,${totalProfitRateYoY >= 0 ? '+' : ''}${totalProfitRateYoY.toFixed(2)}%\n`;
        
        // 下載 CSV
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.setAttribute('href', url);
        link.setAttribute('download', `${storeName}_${dateStr}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

                html += `

                    </div>

            } else {
                html += `<p style="color: #999; padding: 20px; text-align: center;">此期間無資料</p>`;
            }

            html += `
                    </div>

            `;

            if (hasData2) {
                const total2Amt = categoryData2.totalAmt || 0;
                categoryData2.top3Amt.forEach((item, index) => {
                    const qtyDisplay = item.qty > 0 ? `${item.qty.toLocaleString()} 件` : '-';
                    const amtDisplay = item.amt > 0 ? `${formatAmount(item.amt)}` : '-';

                                    數量: ${qtyDisplay} | 金額: ${amtDisplay}
                                </div>
                            </div>
                        </div>
                    `;
                });
                // 顯示大分類總銷售金額
                const bigCatAmt2 = data2.categories[bigCategory]?.amt || 0;
                html += `
                    <div style="margin-top: 15px; padding: 12px; background: #ede9fe; border-left: 4px solid #8b5cf6; border-radius: 5px;">
                        <strong style="color: #333;">💰 ${bigCategory} 總銷售金額：</strong>
                        <span style="color: #8b5cf6; font-weight: bold; font-size: 1.1em;">${formatAmount(bigCatAmt2)}</span>
                    </div>
                `;
            } else {
                html += `<p style="color: #999; padding: 20px; text-align: center;">此期間無資料</p>`;
            }

            // 添加圖表
            if (hasData1 || hasData2) {
                const chartId = `chart-${storeId}-${bigCategory.replace(/\s+/g, '-')}`;
                
                // 判斷是否需要顯示大分類摘要
                const showCategorySummary = ['CPU', 'iPad', 'iPhone', 'Apple Watch', 'AirPods', 'Audio', 'Care', 'Accy', '3rd Party'].includes(bigCategory);
                
                html += `
                    </div>
                </div>
                
                <div class="chart-container">
                    <h4>📊 ${bigCategory} ${classificationText}銷售數量對比</h4>
                `;
                
                // 如果需要顯示大分類摘要
                if (showCategorySummary) {
                    const qty1 = data1.categories[bigCategory]?.qty || 0;
                    const qty2 = data2.categories[bigCategory]?.qty || 0;
                    const growthRate = qty1 > 0 ? ((qty2 - qty1) / qty1 * 100) : 0;
                    const growthQty = qty2 - qty1;
                    const growthColor = growthRate >= 0 ? '#10b981' : '#ef4444';
                    const growthQtyText = (growthQty >= 0 ? '+' : '') + growthQty.toLocaleString() + '件';
                    const growthRateText = (growthRate >= 0 ? '+' : '') + growthRate.toFixed(2) + '%';
                    
                    html += `
                    <div style="background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 30px;">
                        <div style="display: flex; align-items: center; gap: 8px;">

                }
                
                // 判斷是否使用橫式圖表
                const isHorizontalChart = ['Accy', '3rd Party'].includes(bigCategory);
                
                html += `

            } else {
                html += `
                    </div>
                </div>
                `;

        });

        html += `
            </div>
        `;

        contentContainer.innerHTML = html;

        // 名稱標準化函數
        function normalizeProductName(name, category) {
            if (!name) return name;
            
            let normalizedName = name.trim();
            
            // CPU類：特殊處理和標準化
            if (category === 'CPU') {
                // MacBook Pro -> MBP (不區分大小寫)
                const upperName = normalizedName.toUpperCase();
                
                if (upperName.includes('MACBOOK PRO') || upperName.includes('MBP')) {
                    if (upperName.includes('14')) {
                        return 'MBP 14';
                    }
                    if (upperName.includes('16')) {
                        return 'MBP 16';
                    }
                }
                
                // 移除其他MacBook的晶片型號
                normalizedName = normalizedName.replace(/\s*\([^)]*\)/g, '').trim();
                
                return normalizedName;
            }
            
            // iPad類：統一不同版本
            if (category === 'iPad') {
                // iPad 9/10/iPad(A16) -> iPad
                if (normalizedName.includes('iPad 9') || 
                    normalizedName.includes('iPad 10') || 
                    normalizedName.includes('iPad(A16)') ||
                    normalizedName.includes('iPad (A16)')) {
                    return 'iPad';
                }
                
                // iPad Air 11in
                if (normalizedName.includes('iPad Air') && normalizedName.includes('11')) {
                    return 'iPad Air 11in';
                }
                
                // iPad Air 13in
                if (normalizedName.includes('iPad Air') && normalizedName.includes('13')) {
                    return 'iPad Air 13in';
                }
                
                // iPad mini 6/iPad mini(A17 Pro) -> iPad mini
                if (normalizedName.includes('iPad mini 6') || 
                    normalizedName.includes('iPad mini(A17 Pro)') ||
                    normalizedName.includes('iPad mini (A17 Pro)')) {
                    return 'iPad mini';
                }
                
                // iPad Pro 11 (移除晶片型號)
                if (normalizedName.includes('iPad Pro') && normalizedName.includes('11')) {
                    return 'iPad Pro 11';
                }
                
                // iPad Pro 13 (移除晶片型號)
                if (normalizedName.includes('iPad Pro') && normalizedName.includes('13')) {
                    return 'iPad Pro 13';
                }
                
                // iPad Pro - 移除晶片型號
                if (normalizedName.includes('iPad Pro')) {
                    normalizedName = normalizedName.replace(/\s*\([^)]*\)/g, '').trim();
                    return normalizedName;
                }
                
                return normalizedName;
            }
            
            // AirPods類：統一版本
            if (category === 'AirPods') {
                // AirPods Max (不分版本)
                if (normalizedName.includes('AirPods Max')) {
                    return 'AirPods Max';
                }
                
                // AirPods Pro (不分版本，移除代數)
                if (normalizedName.includes('AirPods Pro')) {
                    return 'AirPods Pro';
                }
                
                // AirPods 3/4 -> AirPods (標準版)
                if (normalizedName.includes('AirPods') && !normalizedName.includes('Pro') && !normalizedName.includes('Max')) {
                    return 'AirPods';
                }
                
                return normalizedName;
            }
            
            // Audio類：HomePod系列
            if (category === 'Audio') {
                // HomePod mini
                if (normalizedName.includes('HomePod mini')) {
                    return 'HomePod mini';
                }
                
                // HomePod (標準版，排除mini)
                if (normalizedName.includes('HomePod') && !normalizedName.includes('mini')) {
                    return 'HomePod';
                }
                
                return normalizedName;
            }
            
            // Apple Watch類：統一系列版本
            if (category === 'Apple Watch') {
                // Series 10/11 -> Series
                if (normalizedName.includes('S10') || normalizedName.includes('S11')) {
                    return normalizedName.replace(/S1[01]/g, 'Series').trim();
                }
                
                // SE 2/3 -> SE
                if (normalizedName.includes('SE 2') || normalizedName.includes('SE 3')) {
                    return normalizedName.replace(/SE [23]/g, 'SE').trim();
                }
                
                // Ultra 2/3 -> Ultra
                if (normalizedName.includes('Ultra 2') || normalizedName.includes('Ultra 3')) {
                    return normalizedName.replace(/Ultra [23]/g, 'Ultra').trim();
                }
                
                return normalizedName;
            }
            
            // iPhone類：移除年份數字
            if (category === 'iPhone') {
                // iPhone 17 Pro Max -> iPhone Pro Max
                // iPhone 16 -> iPhone
                normalizedName = normalizedName.replace(/iPhone\s+\d+/g, 'iPhone').trim();
                return normalizedName;
            }
            
            return normalizedName;
        }

        // 渲染所有圖表
        setTimeout(() => {
            targetCategories.forEach(bigCategory => {
                const categoryData1 = data1.categoryTop3[bigCategory];
                const categoryData2 = data2.categoryTop3[bigCategory];
                
                const hasData1 = categoryData1 && categoryData1.allData && categoryData1.allData.length > 0;
                const hasData2 = categoryData2 && categoryData2.allData && categoryData2.allData.length > 0;
                
                if (!hasData1 && !hasData2) return;

                // 渲染中分類圖表
                const chartId = `chart-${storeId}-${bigCategory.replace(/\s+/g, '-')}`;
                const canvas = document.getElementById(chartId);
                if (!canvas) return;

                // 收集並標準化中分類名稱
                const normalizedData1 = {};
                const normalizedData2 = {};
                
                if (hasData1) {
                    categoryData1.allData.forEach(item => {
                        const normalizedName = normalizeProductName(item.name, bigCategory);
                        if (!normalizedData1[normalizedName]) {
                            normalizedData1[normalizedName] = 0;
                        }
                        normalizedData1[normalizedName] += item.qty;
                    });
                }
                
                if (hasData2) {
                    categoryData2.allData.forEach(item => {
                        const normalizedName = normalizeProductName(item.name, bigCategory);
                        if (!normalizedData2[normalizedName]) {
                            normalizedData2[normalizedName] = 0;
                        }
                        normalizedData2[normalizedName] += item.qty;
                    });
                }

                // 收集所有標準化後的分類名稱
                const allCategories = new Set([
                    ...Object.keys(normalizedData1),
                    ...Object.keys(normalizedData2)
                ]);
                const categories = Array.from(allCategories).sort();

                // 準備數據
                const data1Values = categories.map(cat => normalizedData1[cat] || 0);
                const data2Values = categories.map(cat => normalizedData2[cat] || 0);

                // 判斷是否要顯示數量標籤（Care, Accy, 3rd Party 不顯示）
                const shouldShowLabels = !['Care', 'Accy', '3rd Party'].includes(bigCategory);
                
                // 判斷是否使用橫式圖表（Accy 和 3rd Party 品項太多，改用橫式）
                const isHorizontal = ['Accy', '3rd Party'].includes(bigCategory);

                // 創建圖表
                new Chart(canvas, {
                    type: 'bar',
                    plugins: [
                        ChartDataLabels,
                        {
                            id: 'growthIndicators',
                            afterDraw: function(chart) {
                                const ctx = chart.ctx;
                                const xAxis = chart.scales.x;
                                const yAxis = chart.scales.y;
                                
                                ctx.save();
                                
                                if (isHorizontal) {
                                    // 橫式圖表：在品項右側顯示數據（加強視覺引導）
                                    ctx.textBaseline = 'middle';
                                    
                                    categories.forEach((category, index) => {
                                        const val1 = normalizedData1[category] || 0;
                                        const val2 = normalizedData2[category] || 0;
                                        const diff = val2 - val1;
                                        const yoy = val1 > 0 ? ((val2 - val1) / val1 * 100) : 0;
                                        
                                        const y = yAxis.getPixelForValue(index);
                                        const x1 = xAxis.right + 25;  // 增加間距
                                        
                                        // 繪製分隔線
                                        ctx.strokeStyle = '#e0e0e0';
                                        ctx.lineWidth = 1;
                                        ctx.beginPath();
                                        ctx.moveTo(xAxis.right + 10, y);
                                        ctx.lineTo(xAxis.right + 20, y);
                                        ctx.stroke();
                                        
                                        // 第一列：數量增減（帶背景框）
                                        ctx.font = 'bold 12px Arial';
                                        const diffText = diff >= 0 ? `+${diff.toLocaleString()}` : diff.toLocaleString();
                                        const diffTextWidth = ctx.measureText(diffText).width;
                                        
                                        // 繪製背景框
                                        const bgColor = diff >= 0 ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
                                        ctx.fillStyle = bgColor;
                                        ctx.fillRect(x1 - 4, y - 10, diffTextWidth + 8, 20);
                                        
                                        // 繪製文字
                                        ctx.textAlign = 'left';
                                        ctx.fillStyle = diff >= 0 ? '#10b981' : '#ef4444';
                                        ctx.fillText(diffText, x1, y);
                                        
                                        // 第二列：成長率（在第一列右側，帶背景框）
                                        const x2 = x1 + diffTextWidth + 20;
                                        ctx.font = 'bold 12px Arial';
                                        
                                        if (yoy !== 0) {
                                            const symbol = yoy > 0 ? '▲' : '▼';
                                            const percentText = yoy >= 0 ? `+${yoy.toFixed(1)}%` : `${yoy.toFixed(1)}%`;
                                            const fullText = `${symbol} ${percentText}`;
                                            const percentTextWidth = ctx.measureText(fullText).width;
                                            
                                            // 繪製背景框
                                            const percentBgColor = yoy > 0 ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
                                            ctx.fillStyle = percentBgColor;
                                            ctx.fillRect(x2 - 4, y - 10, percentTextWidth + 8, 20);
                                            
                                            // 繪製文字
                                            ctx.fillStyle = yoy > 0 ? '#10b981' : '#ef4444';
                                            ctx.fillText(fullText, x2, y);
                                        }
                                    });
                                } else {
                                    // 豎式圖表：原有的下方顯示邏輯
                                    ctx.textAlign = 'center';
                                    ctx.textBaseline = 'top';
                                    
                                    categories.forEach((category, index) => {
                                        const val1 = normalizedData1[category] || 0;
                                        const val2 = normalizedData2[category] || 0;
                                        const diff = val2 - val1;
                                        const yoy = val1 > 0 ? ((val2 - val1) / val1 * 100) : 0;
                                        
                                        const x = xAxis.getPixelForValue(index);
                                        
                                        // 第一行：數量增減（在品項名稱下方 35px）
                                        const y1 = yAxis.bottom + 35;
                                        ctx.font = 'bold 12px Arial';
                                        ctx.fillStyle = diff >= 0 ? '#10b981' : '#ef4444';
                                        const diffText = diff >= 0 ? `+${diff.toLocaleString()}` : diff.toLocaleString();
                                        ctx.fillText(diffText, x, y1);
                                        
                                        // 第二行：成長率符號和百分比（在第一行下方 16px）
                                        const y2 = y1 + 16;
                                        ctx.font = 'bold 12px Arial';
                                        
                                        if (yoy !== 0) {
                                            const symbol = yoy > 0 ? '▲' : '▼';
                                            const percentText = yoy >= 0 ? `+${yoy.toFixed(1)}%` : `${yoy.toFixed(1)}%`;
                                            const fullText = `${symbol} ${percentText}`;
                                            
                                            ctx.fillStyle = yoy > 0 ? '#10b981' : '#ef4444';
                                            ctx.fillText(fullText, x, y2);
                                        }
                                    });
                                }
                                
                                ctx.restore();
                            }
                        }
                    ],
                    data: {
                        labels: categories,
                        datasets: [
                            {
                                label: period1Name,
                                data: data1Values,
                                backgroundColor: 'rgba(25, 118, 210, 0.7)',
                                borderColor: 'rgba(25, 118, 210, 1)',
                                borderWidth: 1
                            },
                            {
                                label: period2Name,
                                data: data2Values,
                                backgroundColor: 'rgba(123, 31, 162, 0.7)',
                                borderColor: 'rgba(123, 31, 162, 1)',
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        indexAxis: isHorizontal ? 'y' : 'x',
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: {
                            padding: isHorizontal ? {
                                right: 200  // 橫式圖表右側留更多空間給數據和背景框
                            } : {
                                bottom: 40  // 豎式圖表底部留空給數據
                            }
                        },
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        const value = isHorizontal ? context.parsed.x : context.parsed.y;
                                        label += value.toLocaleString() + ' 件';
                                        return label;
                                    }
                                }
                            },
                            datalabels: {
                                display: true,  // 橫式圖表也要顯示數值
                                anchor: isHorizontal ? 'end' : 'end',
                                align: isHorizontal ? 'end' : 'end',
                                offset: 4,
                                color: function(context) {
                                    // 根據 dataset 索引返回對應顏色
                                    return context.datasetIndex === 0 ? 'rgb(25, 118, 210)' : 'rgb(123, 31, 162)';
                                },
                                font: {
                                    weight: 'bold',
                                    size: 12
                                },
                                formatter: function(value) {
                                    return value > 0 ? value.toLocaleString() : '';
                                }
                            }
                        },
                        scales: isHorizontal ? {
                            x: {
                                beginAtZero: true,
                                grace: '10%',
                                ticks: {
                                    callback: function(value) {
                                        return value.toLocaleString();
                                    }
                                }
                            },
                            y: {
                                ticks: {
                                    padding: 8,  // 增加行高，讓數據不擁擠
                                    font: {
                                        weight: 'bold',
                                        size: 12  // 品項名稱字體也稍微增大
                                    }
                                }
                            }
                        } : {
                            x: {
                                ticks: {
                                    padding: 5,
                                    font: {
                                        weight: 'bold'
                                    }
                                }
                            },
                            y: {
                                beginAtZero: true,
                                grace: '10%',
                                ticks: {
                                    callback: function(value) {
                                        return value.toLocaleString();
                                    }
                                }
                            }
                        }
                    }
                });
            });
        }, 100);
    }
</script>
